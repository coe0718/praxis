[package]
name = "praxis"
version = "0.1.0"
edition = "2024"
description = "A self-evolving personal AI agent foundation"
license = "MIT"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["clock", "serde"] }
chrono-tz = "0.10"
clap = { version = "4.5", features = ["derive"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
